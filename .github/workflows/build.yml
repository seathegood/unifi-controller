name: Build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Makefile
      - build.sh
      - docker-compose.yml
      - entrypoint.sh
      - entrypoint-functions.sh
      - healthcheck.sh
      - system.properties.default
      - .github/workflows/build.yml
      - .github/scripts/**
      - versions.txt
  pull_request:
    paths:
      - Dockerfile
      - Makefile
      - build.sh
      - docker-compose.yml
      - entrypoint.sh
      - entrypoint-functions.sh
      - healthcheck.sh
      - system.properties.default
      - .github/workflows/build.yml
      - .github/scripts/**
      - versions.txt
  workflow_dispatch:

env:
  IMAGE_NAME: seathegood/unifi-controller

jobs:
  build:
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Contract checks
        run: make check

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
          labels: |
            org.opencontainers.image.title=Unifi Controller
            org.opencontainers.image.description=Unifi Controller without a local MongoDB instance
            org.opencontainers.image.vendor=Sea the Good, LLC
            org.opencontainers.image.licenses=MIT

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Build image (multi-arch cache prime)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build image for smoke tests (amd64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:ci-test-${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --rm --entrypoint bash ${{ env.IMAGE_NAME }}:ci-test-${{ github.sha }} \
            -c "dpkg -s unifi | grep -i '^Version'"
